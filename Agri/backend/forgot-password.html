<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Agri-Verse</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{min-height:100vh;background:linear-gradient(135deg,#0f2d1a 0%,#1b4332 50%,#2d6a4f 100%);display:flex;align-items:center;justify-content:center;padding:1rem;}
        .box{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
        .logo{text-align:center;margin-bottom:1.8rem;}
        .logo img{height:52px;width:52px;border-radius:12px;object-fit:cover;}
        .logo h1{font-size:1.4rem;font-weight:700;color:#1b4332;margin-top:8px;}
        .logo p{font-size:0.82rem;color:#888;margin-top:3px;}
        .step{display:none;}
        .step.active{display:block;}
        .icon-wrap{text-align:center;margin-bottom:1.5rem;}
        .icon-circle{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:1.8rem;}
        h2{text-align:center;font-size:1.1rem;color:#1b4332;margin-bottom:6px;}
        .sub{text-align:center;font-size:0.82rem;color:#888;margin-bottom:1.5rem;line-height:1.6;}
        .field{margin-bottom:1.1rem;}
        .field label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:5px;}
        .field-wrap{position:relative;}
        .field-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#aaa;font-size:0.88rem;}
        .field input{width:100%;padding:12px 13px 12px 38px;border:2px solid #e0e0e0;border-radius:12px;font-size:0.9rem;outline:none;transition:border 0.3s;font-family:'Poppins',sans-serif;}
        .field input:focus{border-color:#2d6a4f;}
        .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;cursor:pointer;}
        .btn{width:100%;background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border:none;padding:13px;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;margin-top:4px;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(45,106,79,0.35);}
        .btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
        .msg{padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-top:10px;display:none;align-items:center;gap:8px;}
        .msg-ok{background:#e8f5e9;color:#2d6a4f;}
        .msg-err{background:#ffebee;color:#c62828;}
        .links{text-align:center;margin-top:1.3rem;font-size:0.82rem;color:#888;}
        .links a{color:#2d6a4f;font-weight:600;text-decoration:none;}
        .links a:hover{text-decoration:underline;}
        /* Success screen */
        .success-icon{font-size:3.5rem;text-align:center;margin-bottom:1rem;}
        .email-highlight{background:#e8f5e9;border-radius:10px;padding:10px 14px;text-align:center;font-weight:700;color:#1b4332;font-size:0.9rem;margin:12px 0;}
        .timer{text-align:center;font-size:0.8rem;color:#f9c74f;background:rgba(249,199,79,0.1);border:1px solid rgba(249,199,79,0.3);border-radius:8px;padding:8px;margin-top:10px;}
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <img src="images/logoss.jpg" alt="Logo">
        <h1>Agri-Verse</h1>
    </div>

    <!-- STEP 1: Enter Email -->
    <div class="step active" id="step1">
        <div class="icon-wrap"><div class="icon-circle">🔐</div></div>
        <h2>Password Bhuli Gaya?</h2>
        <p class="sub">Taro registered email nakho — reset link moklavishu</p>
        <div class="field">
            <label>Email Address</label>
            <div class="field-wrap">
                <i class="fas fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="taro@email.com">
            </div>
        </div>
        <button class="btn" id="sendBtn" onclick="sendResetLink()">
            <i class="fas fa-paper-plane"></i> Reset Link Moklo
        </button>
        <div class="msg" id="step1Msg"></div>
        <div class="links">
            Yaad avyu? <a href="login.html">Login karo</a>
        </div>
    </div>

    <!-- STEP 2: Email Sent -->
    <div class="step" id="step2">
        <div class="success-icon">📧</div>
        <h2>Email Moklayo!</h2>
        <p class="sub">Reset link tara email par moklayo che. Check karo:</p>
        <div class="email-highlight" id="sentToEmail"></div>
        <div class="timer">⏰ Link 30 minutes ma expire thashe</div>
        <p class="sub" style="margin-top:1rem;font-size:0.78rem;">Email na maldhu? Spam folder check karo. Pachhi try karo:</p>
        <button class="btn" onclick="showStep1()" style="background:#f5f5f5;color:#555;box-shadow:none;margin-top:0;">
            <i class="fas fa-redo"></i> Pharthi Try Karo
        </button>
        <div class="links" style="margin-top:1rem;">
            <a href="login.html">← Login par Jao</a>
        </div>
    </div>

</div>

<script>
const API = 'https://agri-project-ol6n.onrender.com';

async function sendResetLink() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showMsg('step1Msg', 'Email nakho!', false); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { showMsg('step1Msg', 'Valid email nakho!', false); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Moklav che...';
    document.getElementById('step1Msg').style.display = 'none';

    try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('sentToEmail').textContent = '📧 ' + email;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        } else {
            showMsg('step1Msg', data.message || 'Error thayo', false);
        }
    } catch(e) {
        showMsg('step1Msg', 'Server connect nahi thayu. Try again.', false);
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Reset Link Moklo';
}

function showStep1() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    document.getElementById('resetEmail').value = '';
}

function showMsg(id, msg, ok) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
    el.style.display = 'flex';
}

document.getElementById('resetEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendResetLink();
});
</script>
</body>
</html>
