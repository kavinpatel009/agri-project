<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Agri-Verse</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="description" content="Agri-Verse - Empowering farmers with smart technology.">
    <meta name="google-site-verification" content="Oqb1mGBpZ6HuSPzS7BDLvGmmgaVVpDxGKQ9fYQs3hrc" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --green:#2d6a4f; --green-light:#52b788; --green-pale:#d8f3dc; --cream:#fefae0; --dark:#1b4332; --text:#2d3748; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { min-height:100vh; display:flex; font-family:'DM Sans',sans-serif; background:var(--cream); }
        .left-panel { width:45%; background:linear-gradient(160deg,var(--dark) 0%,var(--green) 60%,var(--green-light) 100%); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:60px 40px; position:relative; overflow:hidden; }
        .left-panel::before { content:''; position:absolute; width:400px; height:400px; border-radius:50%; background:rgba(255,255,255,0.05); top:-100px; left:-100px; }
        .brand { text-align:center; z-index:1; }
        .brand img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid rgba(255,255,255,0.3); margin-bottom:20px; }
        .brand h1 { font-family:'Playfair Display',serif; color:#fff; font-size:2.5rem; margin-bottom:10px; }
        .brand p { color:rgba(255,255,255,0.75); font-size:1rem; line-height:1.6; max-width:280px; }
        .perks { margin-top:50px; z-index:1; width:100%; max-width:300px; }
        .perk { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
        .perk-icon { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.9rem; flex-shrink:0; }
        .perk span { color:rgba(255,255,255,0.85); font-size:0.88rem; }
        .right-panel { width:55%; display:flex; align-items:center; justify-content:center; padding:40px; overflow-y:auto; }
        .signup-card { width:100%; max-width:420px; }
        .signup-card h2 { font-family:'Playfair Display',serif; color:var(--dark); font-size:2rem; margin-bottom:8px; }
        .signup-card .subtitle { color:#718096; font-size:0.95rem; margin-bottom:30px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:0.85rem; font-weight:500; color:var(--text); margin-bottom:8px; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#a0aec0; font-size:0.95rem; }
        .input-wrap input { width:100%; padding:13px 16px 13px 44px; border:2px solid #e2e8f0; border-radius:12px; font-size:0.95rem; font-family:'DM Sans',sans-serif; color:var(--text); background:#fff; transition:all 0.3s; outline:none; }
        .input-wrap input:focus { border-color:var(--green-light); box-shadow:0 0 0 4px rgba(82,183,136,0.1); }
        .btn-signup { width:100%; padding:14px; background:linear-gradient(135deg,var(--dark),var(--green)); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px; }
        .btn-signup:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(45,106,79,0.35); }
        .divider { display:flex; align-items:center; gap:15px; margin:20px 0; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
        .divider span { color:#a0aec0; font-size:0.85rem; }
        .login-link { text-align:center; font-size:0.9rem; color:#718096; }
        .login-link a { color:var(--green); font-weight:600; text-decoration:none; }
        #message { margin-top:15px; padding:12px 16px; border-radius:10px; font-size:0.9rem; text-align:center; }
        .back-home { display:inline-flex; align-items:center; gap:6px; color:#718096; text-decoration:none; font-size:0.85rem; margin-bottom:25px; transition:color 0.2s; }
        .back-home:hover { color:var(--green); }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media(max-width:768px) { .left-panel{display:none;} .right-panel{width:100%;padding:30px 25px;} }
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="brand">
            <img src="images/logoss.jpg" alt="Agri-Verse Logo">
            <h1>Agri-Verse</h1>
            <p>Join thousands of farmers using smart technology.</p>
        </div>
        <div class="perks">
            <div class="perk"><div class="perk-icon"><i class="fas fa-check"></i></div><span>Free weather forecasts</span></div>
            <div class="perk"><div class="perk-icon"><i class="fas fa-check"></i></div><span>Save your locations</span></div>
            <div class="perk"><div class="perk-icon"><i class="fas fa-check"></i></div><span>Latest farming news</span></div>
            <div class="perk"><div class="perk-icon"><i class="fas fa-check"></i></div><span>Seeds and fertilizer guides</span></div>
        </div>
    </div>
    <div class="right-panel">
        <div class="signup-card">
            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <h2>Create Account 🌱</h2>
            <p class="subtitle">Join the Agri-Verse community today</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Min. 6 characters" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                    </div>
                </div>
                <button type="submit" class="btn-signup"><i class="fas fa-user-plus"></i> Create Account</button>
                <div id="message"></div>
            </form>
            <div class="divider"><span>or</span></div>
            <p class="login-link">Already have an account? <a href="login.html">Login →</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
