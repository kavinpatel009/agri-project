<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Agri-Verse</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{min-height:100vh;background:linear-gradient(135deg,#0f2d1a 0%,#1b4332 50%,#2d6a4f 100%);display:flex;align-items:center;justify-content:center;padding:1rem;}
        .box{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
        .logo{text-align:center;margin-bottom:1.8rem;}
        .logo img{height:52px;width:52px;border-radius:12px;object-fit:cover;}
        .logo h1{font-size:1.4rem;font-weight:700;color:#1b4332;margin-top:8px;}
        .step{display:none;} .step.active{display:block;}
        .icon-circle{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:1.8rem;}
        h2{text-align:center;font-size:1.1rem;color:#1b4332;margin-bottom:6px;}
        .sub{text-align:center;font-size:0.82rem;color:#888;margin-bottom:1.5rem;line-height:1.6;}
        .field{margin-bottom:1.1rem;}
        .field label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:5px;}
        .fw{position:relative;}
        .fw i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#aaa;font-size:0.88rem;}
        .fw input{width:100%;padding:12px 13px 12px 38px;border:2px solid #e0e0e0;border-radius:12px;font-size:0.9rem;outline:none;transition:border 0.3s;font-family:'Poppins',sans-serif;}
        .fw input:focus{border-color:#2d6a4f;}
        .btn{width:100%;background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border:none;padding:13px;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;margin-top:4px;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(45,106,79,0.35);}
        .btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
        .btn-gray{background:#f0f0f0;color:#555;box-shadow:none;}
        .btn-gray:hover{background:#e0e0e0;transform:none;box-shadow:none;}
        .msg{padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-top:10px;display:none;}
        .msg-ok{background:#e8f5e9;color:#2d6a4f;} .msg-err{background:#ffebee;color:#c62828;}
        .links{text-align:center;margin-top:1.3rem;font-size:0.82rem;color:#888;}
        .links a{color:#2d6a4f;font-weight:600;text-decoration:none;}
        .email-box{background:#e8f5e9;border-radius:10px;padding:10px 14px;text-align:center;font-weight:700;color:#1b4332;font-size:0.9rem;margin:12px 0;}
        .warn-box{text-align:center;font-size:0.8rem;color:#795548;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px;margin-top:10px;}
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <img src="images/logoss.jpg" alt="Logo">
        <h1>Agri-Verse</h1>
    </div>

    <!-- STEP 1 -->
    <div class="step active" id="step1">
        <div class="icon-circle" style="margin:0 auto 1.2rem;">🔐</div>
        <h2>Forgot Your Password?</h2>
        <p class="sub">Enter your registered email and we'll send you a reset link.</p>
        <div class="field">
            <label>Email Address</label>
            <div class="fw">
                <i class="fas fa-envelope"></i>
                <input type="email" id="resetEmail" placeholder="your@email.com">
            </div>
        </div>
        <button class="btn" id="sendBtn" onclick="sendLink()">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
        <div class="msg" id="msg1"></div>
        <div class="links">Remembered it? <a href="login.html">Login here</a></div>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
        <div style="font-size:3.5rem;text-align:center;margin-bottom:1rem;">📧</div>
        <h2>Check Your Email!</h2>
        <p class="sub">A password reset link has been sent to:</p>
        <div class="email-box" id="sentEmail"></div>
        <div class="warn-box">⏰ This link expires in <strong>30 minutes</strong>.</div>
        <p class="sub" style="margin-top:1rem;font-size:0.78rem;">Didn't receive it? Check your spam folder or try again.</p>
        <button class="btn btn-gray" onclick="goBack()">
            <i class="fas fa-redo"></i> Try Again
        </button>
        <div class="links"><a href="login.html">← Back to Login</a></div>
    </div>
</div>

<script>
const API = 'https://agri-project-ol6n.onrender.com';

async function sendLink() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showMsg('Please enter your email address.', false); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { showMsg('Please enter a valid email address.', false); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
    document.getElementById('msg1').style.display = 'none';

    try {
        const res = await fetch(`${API}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (res.ok) {
            document.getElementById('sentEmail').textContent = '📧 ' + email;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        } else {
            showMsg(data.message || 'Something went wrong. Please try again.', false);
        }
    } catch(e) {
        showMsg('Could not connect to server. Please try again.', false);
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
}

function goBack() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    document.getElementById('resetEmail').value = '';
}

function showMsg(msg, ok) {
    const el = document.getElementById('msg1');
    el.textContent = msg;
    el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
    el.style.display = 'block';
}

document.getElementById('resetEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendLink();
});
</script>
</body>
</html>
