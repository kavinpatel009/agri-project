<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Agri-Verse</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{min-height:100vh;background:linear-gradient(135deg,#0f2d1a 0%,#1b4332 50%,#2d6a4f 100%);display:flex;align-items:center;justify-content:center;padding:1rem;}
        .box{background:#fff;border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
        .logo{text-align:center;margin-bottom:1.8rem;}
        .logo img{height:52px;width:52px;border-radius:12px;object-fit:cover;}
        .logo h1{font-size:1.4rem;font-weight:700;color:#1b4332;margin-top:8px;}
        .step{display:none;}
        .step.active{display:block;}
        .icon-circle{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;font-size:1.8rem;}
        h2{text-align:center;font-size:1.1rem;color:#1b4332;margin-bottom:6px;}
        .sub{text-align:center;font-size:0.82rem;color:#888;margin-bottom:1.5rem;line-height:1.6;}
        .field{margin-bottom:1.1rem;}
        .field label{display:block;font-size:0.8rem;font-weight:600;color:#555;margin-bottom:5px;}
        .field-wrap{position:relative;}
        .field-wrap i.ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#aaa;font-size:0.88rem;}
        .field input{width:100%;padding:12px 40px 12px 38px;border:2px solid #e0e0e0;border-radius:12px;font-size:0.9rem;outline:none;transition:border 0.3s;font-family:'Poppins',sans-serif;}
        .field input:focus{border-color:#2d6a4f;}
        .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;cursor:pointer;font-size:0.88rem;}
        /* Strength bar */
        .strength-bar{height:4px;border-radius:4px;background:#f0f0f0;margin-top:6px;overflow:hidden;}
        .strength-fill{height:100%;border-radius:4px;width:0;transition:width 0.4s,background 0.4s;}
        .strength-label{font-size:0.72rem;margin-top:3px;color:#aaa;}
        .btn{width:100%;background:linear-gradient(135deg,#1b4332,#2d6a4f);color:#fff;border:none;padding:13px;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;margin-top:4px;}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(45,106,79,0.35);}
        .btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
        .msg{padding:10px 14px;border-radius:10px;font-size:0.82rem;margin-top:10px;display:none;align-items:center;gap:8px;}
        .msg-ok{background:#e8f5e9;color:#2d6a4f;}
        .msg-err{background:#ffebee;color:#c62828;}
        .links{text-align:center;margin-top:1.3rem;font-size:0.82rem;color:#888;}
        .links a{color:#2d6a4f;font-weight:600;text-decoration:none;}
        /* Error screen */
        .err-icon{font-size:3rem;text-align:center;margin-bottom:1rem;}
        /* Success screen */
        .success-anim{font-size:3.5rem;text-align:center;margin-bottom:1rem;animation:pop 0.5s ease;}
        @keyframes pop{0%{transform:scale(0.5);opacity:0;}80%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
        .countdown{text-align:center;font-size:0.82rem;color:#888;margin-top:10px;}
        #countNum{font-weight:700;color:#2d6a4f;}
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <img src="images/logoss.jpg" alt="Logo">
        <h1>Agri-Verse</h1>
    </div>

    <!-- INVALID TOKEN -->
    <div class="step" id="stepInvalid">
        <div class="err-icon">⚠️</div>
        <h2 style="color:#c62828;">Invalid Link</h2>
        <p class="sub">Aa reset link invalid che ya expire thai gayi che.</p>
        <a href="forgot-password.html">
            <button class="btn"><i class="fas fa-redo"></i> Navo Link Mangavo</button>
        </a>
        <div class="links"><a href="login.html">← Login par Jao</a></div>
    </div>

    <!-- RESET FORM -->
    <div class="step" id="stepForm">
        <div class="icon-circle">🔑</div>
        <h2>Navu Password Set Karo</h2>
        <p class="sub">Strong password banavo</p>

        <div class="field">
            <label>New Password</label>
            <div class="field-wrap">
                <i class="fas fa-lock ico"></i>
                <input type="password" id="newPw" placeholder="Min 6 characters" oninput="checkStrength(this.value)">
                <button class="toggle-pw" onclick="togglePw('newPw','e1')" type="button"><i id="e1" class="fas fa-eye"></i></button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>
        <div class="field">
            <label>Confirm Password</label>
            <div class="field-wrap">
                <i class="fas fa-key ico"></i>
                <input type="password" id="confirmPw" placeholder="Pharthi nakho">
                <button class="toggle-pw" onclick="togglePw('confirmPw','e2')" type="button"><i id="e2" class="fas fa-eye"></i></button>
            </div>
        </div>
        <button class="btn" id="resetBtn" onclick="resetPassword()">
            <i class="fas fa-shield-alt"></i> Password Set Karo
        </button>
        <div class="msg" id="formMsg"></div>
    </div>

    <!-- SUCCESS -->
    <div class="step" id="stepSuccess">
        <div class="success-anim">✅</div>
        <h2>Password Change Thayu!</h2>
        <p class="sub">Taro password successfully reset thayu che. Havar login kari shako cho.</p>
        <a href="login.html">
            <button class="btn"><i class="fas fa-sign-in-alt"></i> Login Karo</button>
        </a>
        <div class="countdown">Auto redirect: <span id="countNum">5</span> sec ma</div>
    </div>
</div>

<script>
const API = 'https://agri-project-ol6n.onrender.com';

// Get token from URL
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

// Show correct step on load
if (!token) {
    showStep('stepInvalid');
} else {
    showStep('stepForm');
}

function showStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// Password strength checker
function checkStrength(pw) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
        { w:'0%',   bg:'#e0e0e0', txt:'' },
        { w:'25%',  bg:'#e53935', txt:'Weak' },
        { w:'50%',  bg:'#f9a825', txt:'Fair' },
        { w:'75%',  bg:'#43a047', txt:'Good' },
        { w:'100%', bg:'#1b5e20', txt:'Strong 💪' },
    ];
    const l = levels[Math.min(score, 4)];
    fill.style.width = l.w;
    fill.style.background = l.bg;
    label.textContent = l.txt;
    label.style.color = l.bg;
}

async function resetPassword() {
    const newPw    = document.getElementById('newPw').value;
    const confirmPw = document.getElementById('confirmPw').value;

    if (!newPw || !confirmPw) { showMsg('Badha fields bharvo!', false); return; }
    if (newPw.length < 6) { showMsg('Password min 6 characters joie!', false); return; }
    if (newPw !== confirmPw) { showMsg('Passwords match nahi karta!', false); return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

    try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword: newPw })
        });
        const data = await res.json();

        if (res.ok) {
            showStep('stepSuccess');
            // Countdown redirect
            let count = 5;
            const timer = setInterval(() => {
                count--;
                document.getElementById('countNum').textContent = count;
                if (count <= 0) {
                    clearInterval(timer);
                    window.location.href = 'login.html';
                }
            }, 1000);
        } else {
            if (data.message?.includes('expired') || data.message?.includes('Invalid')) {
                showStep('stepInvalid');
            } else {
                showMsg(data.message || 'Error thayo', false);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-shield-alt"></i> Password Set Karo';
            }
        }
    } catch(e) {
        showMsg('Server error. Try again.', false);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-shield-alt"></i> Password Set Karo';
    }
}

function showMsg(msg, ok) {
    const el = document.getElementById('formMsg');
    el.textContent = msg;
    el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
    el.style.display = 'flex';
}

function togglePw(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const ico = document.getElementById(iconId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
</body>
</html>
