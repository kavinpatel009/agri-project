<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Agri-Verse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1b4332,#2d6a4f); font-family:'DM Sans',sans-serif; }
        .container { text-align:center; padding:40px; }
        .emoji { font-size:5rem; margin-bottom:20px; animation:bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        h1 { font-family:'Playfair Display',serif; font-size:6rem; color:rgba(255,255,255,0.15); margin-bottom:-20px; }
        h2 { font-family:'Playfair Display',serif; font-size:2rem; color:#fff; margin-bottom:15px; }
        p { color:rgba(255,255,255,0.7); font-size:1rem; margin-bottom:35px; max-width:350px; margin-left:auto; margin-right:auto; }
        .btn { display:inline-flex; align-items:center; gap:8px; background:#52b788; color:#fff; padding:13px 30px; border-radius:30px; text-decoration:none; font-weight:600; font-size:1rem; transition:all 0.3s; }
        .btn:hover { background:#40916c; transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌾</div>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! This field is empty. The page you are looking for does not exist.</p>
        <a href="index.html" class="btn">🏠 Go Back Home</a>
    </div>
</body>
</html>
